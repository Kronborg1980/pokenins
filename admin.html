<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokenins Admin</title>
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --bg: #1a1a24; --card: rgba(255,255,255,0.03); --accent: #ff9a9e; --text: #fcfcfc; }
        body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; padding: 1.5rem; }
        .mew-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; opacity: 0.05; z-index: -1; pointer-events: none; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 2rem; font-weight: 800; letter-spacing: 1px; }
        .card { background: var(--card); padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #a8a8b8; font-weight: 600; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-bottom: 1rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; font-family: 'Nunito', sans-serif; }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        button { width: 100%; padding: 1rem; background: var(--accent); color: #1a1a24; font-weight: 800; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.2s; }
        button:hover { background: #ffb8bb; }
        
        ul { padding: 0; margin: 0; list-style: none; }
        li { background: rgba(0,0,0,0.2); padding: 1rem; margin-bottom: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 1rem; }
        .item-title { font-weight: 700; font-size: 1.1rem; }
        .item-meta { font-size: 0.85rem; color: #a8a8b8; margin-top: 5px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}
        
        .badge { padding: 4px 10px; font-size: 0.7rem; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
        .b-msrp { background: rgba(255,255,255,0.1); color: #fff; }
        .b-bundle { background: #fecfef; color: #1a1a24; }
        .b-baller { background: #f6d365; color: #1a1a24; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-edit { background: #a1c4fd; color: #1a1a24; }
        .btn-del { background: #ff6b6b; color: white; }
        
        @media(min-width: 600px) { li { flex-direction: row; align-items: center; } .btn-group { width: auto; flex-shrink: 0; } .btn-group button { padding: 8px 16px; width: auto; } }
        #login-section { display: block; } #admin-section { display: none; }
    </style>
</head>
<body>
    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/151.png" class="mew-bg">
    <div class="container">
        <h1>POKENINS ADMIN</h1>
        <div id="login-section" class="card">
            <label>Username</label><input type="text" id="login-username">
            <label>Password</label><input type="password" id="login-password">
            <button onclick="login()">Enter Dashboard</button>
        </div>
        <div id="admin-section">
            <div class="card">
                <h3 style="margin-top:0; margin-bottom:1.5rem;">Add / Edit Box</h3>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1">
                        <label>Box Tier</label>
                        <select id="item-type">
                            <option value="msrp">Standard Box</option>
                            <option value="bundle">Bundle Box</option>
                            <option value="baller">Premium Box</option>
                        </select>
                    </div>
                    <div style="flex:1">
                        <label>Status</label>
                        <select id="item-hidden"><option value="false">Public</option><option value="true">Hidden</option></select>
                    </div>
                </div>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>Live Start Date</label><input type="datetime-local" id="item-schedule-date"></div>
                    <div style="flex:1"><label>Auto-Close Date</label><input type="datetime-local" id="item-schedule-end"></div>
                </div>
                <label>Item Name</label><input type="text" id="item-name">
                <label>Description</label><input type="text" id="item-description">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>Price</label><input type="number" id="item-price"></div>
                    <div style="flex:1"><label>Available Spots</label><input type="number" id="item-stock"></div>
                </div>
                <label>Google Form / Checkout Link</label><input type="url" id="item-google-form-link">
                <label>Cover Image</label><input type="file" id="item-image">
                <button id="submit-btn" onclick="submitItem()">Save Item</button>
            </div>
            
            <h3 style="color:#a8a8b8; font-size:1rem; margin-bottom:1rem;">Current Inventory</h3>
            <ul id="item-list"></ul>
            <button onclick="logout()" style="background:rgba(255,255,255,0.1); color:white; margin-top:2rem;">Log Out</button>
        </div>
    </div>
    <script>
        // NOTE: Replace this with your new backend URL!
        const API_URL = 'https://YOUR_NEW_WORKER_URL/api';
        
        let allItems = [], editingId = null, currentImage = '', currentCreatedAt = null, currentClicks = 0; 

        if(localStorage.getItem('adminToken')) {
            document.getElementById('login-section').style.display='none';
            document.getElementById('admin-section').style.display='block';
            loadItems();
        }

        async function login() {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            try {
                const res = await fetch(`${API_URL}/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
                const data = await res.json();
                if(data.success) { localStorage.setItem('adminToken','1'); location.reload(); } 
                else alert('Invalid Credentials.');
            } catch(e) { alert('Server Error.'); }
        }

        async function submitItem() {
            const btn = document.getElementById('submit-btn'); btn.innerText = "Saving...";
            const type = document.getElementById('item-type').value;
            const hidden = document.getElementById('item-hidden').value === 'true';
            const scheduleDate = document.getElementById('item-schedule-date').value; 
            const scheduleEnd = document.getElementById('item-schedule-end').value; 
            const name = document.getElementById('item-name').value;
            const desc = document.getElementById('item-description').value;
            const price = parseFloat(document.getElementById('item-price').value);
            const stock = parseInt(document.getElementById('item-stock').value);
            const form = document.getElementById('item-google-form-link').value;
            const file = document.getElementById('item-image').files[0];

            let img = editingId ? currentImage : '';
            if(file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                await new Promise(r => reader.onload = () => { img = reader.result; r(); });
            }

            const body = { type, name, description:desc, price, stock, googleFormLink:form, image:img, clickCount: editingId ? currentClicks : 0, createdAt: editingId ? currentCreatedAt : Date.now(), hidden, scheduleDate, scheduleEnd };
            const url = editingId ? `${API_URL}/items/${editingId}` : `${API_URL}/items`;
            const method = editingId ? 'PUT' : 'POST';

            try {
                await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
                editingId = null; currentImage = ''; currentCreatedAt = null; currentClicks = 0;
                document.querySelectorAll('input').forEach(i => i.value = '');
                document.getElementById('item-type').value = 'msrp'; document.getElementById('item-hidden').value = 'false';
                btn.innerText = "Save Item"; loadItems();
            } catch(e) { alert("Save Failed."); btn.innerText = "Save Failed"; }
        }

        async function loadItems() {
            try {
                const res = await fetch(`${API_URL}/items`);
                const items = await res.json();
                if(items.error) return;

                items.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
                allItems = items;
                const list = document.getElementById('item-list'); list.innerHTML = '';
                
                items.forEach(item => {
                    let badgeClass = 'b-msrp'; let badgeText = 'Standard';
                    if (item.type === 'baller') { badgeClass = 'b-baller'; badgeText = 'Premium'; } 
                    else if (item.type === 'bundle') { badgeClass = 'b-bundle'; badgeText = 'Bundle'; }
                    
                    const hiddenBadge = item.hidden ? '<span class="badge" style="background:red">Hidden</span>' : '';
                    
                    list.innerHTML += `
                        <li style="${item.hidden ? 'opacity: 0.6;' : ''}">
                            <div style="flex:1">
                                <div style="display:flex; gap:8px; align-items:center;">
                                    <span class="item-title">${item.name}</span>
                                    ${hiddenBadge} <span class="badge ${badgeClass}">${badgeText}</span> 
                                </div>
                                <div class="item-meta">
                                    <span>$${item.price}</span> • <span>Stock: ${item.stock}</span> • <span>🖱️ ${item.clickCount||0} clicks</span>
                                </div>
                            </div>
                            <div class="btn-group">
                                <button class="btn-edit" onclick="startEditing('${item.id}')">Edit</button>
                                <button class="btn-del" onclick="deleteItem('${item.id}')">Del</button>
                            </div>
                        </li>`;
                });
            } catch(e) {}
        }

        function startEditing(id) {
            const item = allItems.find(i => i.id === id);
            if(item) {
                editingId = item.id; currentImage = item.image; currentCreatedAt = item.createdAt; currentClicks = item.clickCount || 0; 
                document.getElementById('item-type').value = item.type || 'msrp';
                document.getElementById('item-hidden').value = item.hidden ? 'true' : 'false';
                document.getElementById('item-schedule-date').value = item.scheduleDate && item.scheduleDate.includes('T') ? item.scheduleDate : ''; 
                document.getElementById('item-schedule-end').value = item.scheduleEnd && item.scheduleEnd.includes('T') ? item.scheduleEnd : '';
                document.getElementById('item-name').value = item.name; document.getElementById('item-description').value = item.description;
                document.getElementById('item-price').value = item.price; document.getElementById('item-stock').value = item.stock;
                document.getElementById('item-google-form-link').value = item.googleFormLink;
                document.getElementById('submit-btn').innerText = "Update Item"; window.scrollTo(0,0);
            }
        }

        async function deleteItem(id) { if(confirm('Delete?')) { await fetch(`${API_URL}/items/${id}`, {method:'DELETE'}); loadItems(); } }
        function logout() { localStorage.removeItem('adminToken'); location.reload(); }
    </script>
</body>
</html>
