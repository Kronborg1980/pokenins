<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokenins</title>
    
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-base: #1a1a24;
            --accent-pink: #ff9a9e;
            --accent-purple: #fecfef;
            --accent-blue: #a1c4fd;
            --text-main: #fcfcfc;
            --text-muted: #a8a8b8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --guardian-size: clamp(100px, 12vw, 180px);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Soft gradient background */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 15% 0%, rgba(255, 154, 158, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 85% 100%, rgba(161, 196, 253, 0.1) 0%, transparent 40%),
                linear-gradient(to bottom, #1a1a24, #12121a);
            z-index: -10; pointer-events: none;
        }

        /* --- CAT POKEMON ASSETS --- */
        .poke-bg {
            position: fixed; pointer-events: none; z-index: -5;
            opacity: 0.15; 
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            will-change: transform; 
        }
        
        /* 151 Mew, 196 Espeon, 300 Skitty, 906 Sprigatito, 725 Litten, 052 Meowth, 509 Purrloin */
        .p-mew { top: -2%; left: -2%; width: var(--guardian-size); animation: float 12s infinite ease-in-out; }
        .p-espeon { top: -2%; right: -2%; width: var(--guardian-size); animation: floatFlipped 14s infinite ease-in-out; }
        .p-skitty { top: 40%; left: -3%; width: calc(var(--guardian-size)*0.8); animation: floatMid 10s infinite ease-in-out 1s; }
        .p-sprigatito { top: 40%; right: -3%; width: calc(var(--guardian-size)*0.8); animation: floatMid 11s infinite ease-in-out 2s; transform: scaleX(-1); }
        .p-litten { bottom: 5%; left: 5%; width: calc(var(--guardian-size)*0.7); animation: sway 12s infinite ease-in-out; }
        .p-purrloin { bottom: 5%; right: 5%; width: calc(var(--guardian-size) * 0.7); animation: sway 10s infinite ease-in-out 1s; transform: scaleX(-1); }

        @keyframes float { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(15px, -20px, 0); } }
        @keyframes floatFlipped { 0%, 100% { transform: scaleX(-1) translate3d(0, 0, 0); } 50% { transform: scaleX(-1) translate3d(-15px, -20px, 0); } }
        @keyframes floatMid { 0%, 100% { transform: translate3d(0, -30px, 0); } 50% { transform: translate3d(10px, 10px, 0); } }
        @keyframes sway { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* MAIN LAYOUT */
        main {
            position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 2rem;
            margin-bottom: 4rem;
        }

        header { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 4rem 1rem 2rem; position: relative; z-index: 2; }
        
        h1 {
            font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; letter-spacing: 1px;
            margin: 0; line-height: 1;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .subtitle { color: var(--text-muted); font-size: 1.2rem; font-weight: 600; margin-top: 0.5rem; letter-spacing: 2px; text-transform: uppercase; }

        /* CLEAN CARDS & PANELS */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .sub-info-panel { display: flex; align-items: center; justify-content: space-between; padding: 2.5rem; gap: 3rem; flex-wrap: wrap; margin-bottom: 4rem; margin-top: 1rem; }
        .sub-text { flex: 1; min-width: 300px; }
        .sub-text h3 { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; color: var(--accent-pink); margin-bottom: 0.5rem; font-weight: 800; }
        .sub-text p { color: var(--text-muted); line-height: 1.6; font-size: 1.05rem; }
        
        .sub-actions { display: flex; gap: 15px; align-items: center; justify-content: center; }
        .sub-btn {
            background: linear-gradient(135deg, #ff4b4b, #ff0000); color: white; padding: 12px 28px; border-radius: 50px;
            text-decoration: none; font-weight: 800; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3); letter-spacing: 1px; font-size: 1.1rem; transition: 0.3s;
        }
        .sub-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 0, 0, 0.4); }

        .section-header { 
            display: flex; align-items: center; gap: 1rem; margin: 3rem 0 2rem;
        }
        .section-title { color: var(--text-main); font-weight: 800; letter-spacing: 2px; font-size: 1.4rem; text-transform: uppercase; }
        .section-line { height: 2px; background: linear-gradient(90deg, var(--card-border), transparent); flex: 1; }

        /* YOUTUBE SECTION */
        .yt-container { display: grid; gap: 25px; grid-template-columns: 1fr; }
        @media (min-width: 900px) { .yt-container { grid-template-columns: 1fr 1fr; } }
        .yt-card { display: flex; flex-direction: column; cursor: pointer; padding: 0; }
        .yt-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.15); }
        
        .yt-label {
            padding: 8px 16px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; letter-spacing: 1px;
            text-transform: uppercase; display:inline-flex; align-items:center; gap:6px;
        }
        .lbl-stream { background: rgba(255, 75, 75, 0.1); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.3); }
        .lbl-hunt { background: rgba(161, 196, 253, 0.1); color: #a1c4fd; border: 1px solid rgba(161, 196, 253, 0.3); }

        /* STORE SECTION */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .item-card { display: flex; flex-direction: column; height: 100%; position: relative; }
        .item-card:hover { transform: translateY(-8px); border-color: rgba(255, 154, 158, 0.4); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        
        .type-tag {
            position: absolute; top: 15px; right: 15px; padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 0.75rem; z-index: 2; letter-spacing: 1px;
            text-transform: uppercase; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 4px;
        }
        .tag-msrp { background: rgba(255,255,255,0.9); color: #333; }
        .tag-bundle { background: var(--accent-purple); color: #333; }
        .tag-baller { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #fff; }
        
        .time-tag-bottom {
            position: absolute; bottom: 10px; left: 10px; 
            padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 0.75rem; z-index: 3; letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(5px); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 5px;
        }
        .tag-is-live { background: #ff4b4b; border-color: #ff4b4b; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 75, 75, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0); } }

        .item-img-box { height: 260px; overflow:hidden; position: relative; cursor: pointer; border-bottom: 1px solid var(--card-border); }
        .item-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .item-card:hover .item-img { transform: scale(1.05); }
        
        .item-content { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
        .item-content h3 { font-size: 1.3rem; margin-bottom: 0.5rem; font-weight: 800; line-height: 1.3; }
        .item-content p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; flex: 1; }
        
        .date-row { display: flex; align-items: center; gap: 6px; color: var(--accent-blue); font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase; }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--card-border); }
        .price { font-size: 1.6rem; font-weight: 800; color: var(--text-main); }
        .stock { font-size: 0.8rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        
        .buy-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 1rem; border-radius: 12px;
            background: rgba(255,255,255,0.1); color: white; text-decoration: none; font-weight: 800; font-size: 1rem; letter-spacing: 1px;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
        }
        .buy-btn:hover { background: rgba(255,255,255,0.2); }
        
        .live-btn { background: var(--accent-pink); border-color: var(--accent-pink); color: #1a1a24; }
        .live-btn:hover { background: #ffb8bb; }
        .live-btn .btn-subtext { color: rgba(0,0,0,0.6); }

        .btn-subtext { font-size: 0.7rem; opacity: 0.8; margin-top: 4px; font-weight: 600; text-transform: uppercase; }
        .sold-out { background: rgba(0,0,0,0.2) !important; color: #666 !important; border-color: rgba(255,255,255,0.05) !important; pointer-events: none; }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 4rem 2rem; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--card-border); grid-column: 1 / -1; }
        .empty-state h2 { color: var(--accent-pink); margin-bottom: 1rem; font-size: 2rem; }
        .empty-state p { color: var(--text-muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto; line-height: 1.6; }

        footer { text-align: center; padding: 2rem 0; color: var(--text-muted); font-size: 0.85rem; }

        /* MODAL */
        .image-modal { display: none; position: fixed; z-index: 9999; padding-top: 50px; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(26, 26, 36, 0.95); align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { max-width: 90%; max-height: 85vh; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: 30px; right: 40px; color: var(--text-main); font-size: 40px; font-weight: 700; cursor: pointer; }

        @media (max-width: 768px) {
            .poke-bg { display: none; } /* Clean up mobile */
            main { padding: 1rem; }
            .sub-info-panel { flex-direction: column; text-align: center; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/151.png" class="poke-bg p-mew">
    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/196.png" class="poke-bg p-espeon">
    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/300.png" class="poke-bg p-skitty">
    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/906.png" class="poke-bg p-sprigatito">
    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/725.png" class="poke-bg p-litten">
    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/509.png" class="poke-bg p-purrloin">
    
    <header>
        <h1>POKENINS</h1>
        <div class="subtitle">Card Breaks & Collections</div>
    </header>

    <main>
        <div class="glass-panel sub-info-panel">
            <div class="sub-text">
                <h3><i class="ph-fill ph-sparkle"></i> Join the Pokenins Family</h3>
                <p>Support the channel, catch the latest streams, and be the first to know when new break boxes drop.</p>
            </div>
            <div class="sub-actions">
                <a href="https://www.youtube.com/@pokenins?sub_confirmation=1" target="_blank" class="sub-btn"><i class="ph-fill ph-youtube-logo"></i> SUBSCRIBE</a>
            </div>
        </div>

        <div class="section-header">
            <span class="section-title">Latest on Channel</span>
            <span class="section-line"></span>
        </div>
        <div id="yt-container" class="yt-container"></div>
        
        <div class="section-header" style="margin-top: 4rem;">
            <span class="section-title">Available Breaks</span>
            <span class="section-line"></span>
        </div>
        <div class="store-grid" id="store-container"></div>
    </main>
    
    <footer><p>© 2025 Pokenins • Catch you on the next stream!</p></footer>

    <div id="myModal" class="image-modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="img01">
    </div>

    <script>
        // NOTE: Replace this with your new backend URL!
        const API_URL = 'https://YOUR_NEW_WORKER_URL/api';

        async function loadVideos() {
            const container = document.getElementById('yt-container');
            try {
                const res = await fetch(`${API_URL}/youtube`);
                const text = await res.text();
                const doc = new DOMParser().parseFromString(text, "text/xml");
                const entries = Array.from(doc.querySelectorAll("entry")).slice(0, 15);
                
                let streamVideo = null, huntVideo = null;

                // Look for live/stream
                for (let entry of entries) {
                    const rawTitle = entry.querySelector("title").textContent;
                    if (rawTitle.toLowerCase().match(/stream|live|break/)) {
                        streamVideo = { id: entry.querySelector("videoId").textContent, title: rawTitle, type: 'stream' };
                        break;
                    }
                }
                // Fallback to latest standard video
                for (let entry of entries) {
                    const rawTitle = entry.querySelector("title").textContent;
                    const id = entry.querySelector("videoId").textContent;
                    if (!rawTitle.toLowerCase().match(/stream|live/) && (!streamVideo || id !== streamVideo.id)) {
                        huntVideo = { id, title: rawTitle, type: 'hunt' };
                        break;
                    }
                }
                
                const videos = [];
                if (streamVideo) videos.push(streamVideo);
                if (huntVideo) videos.push(huntVideo);
                
                if (videos.length === 0) throw new Error("No videos");
                
                let videoHTML = '';
                videos.forEach(v => {
                    const isStream = v.type === 'stream';
                    const badgeHTML = isStream 
                        ? `<div class="yt-label lbl-stream"><i class="ph-fill ph-broadcast"></i> Latest Stream</div>`
                        : `<div class="yt-label lbl-hunt"><i class="ph-fill ph-video"></i> Latest Video</div>`;
                    
                    videoHTML += `
                        <div class="yt-card glass-panel">
                            <div style="padding: 12px 16px;">${badgeHTML}</div>
                            <div style="aspect-ratio: 16/9; width: 100%; position: relative;">
                                <iframe src="https://www.youtube.com/embed/${v.id}?autoplay=0&mute=1&playsinline=1&controls=1&modestbranding=1&rel=0" 
                                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen>
                                </iframe>
                            </div>
                        </div>`;
                });
                container.innerHTML = videoHTML;
            } catch(e) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center;"><a href="https://www.youtube.com/@pokenins" target="_blank" class="buy-btn live-btn" style="max-width:200px; margin:0 auto;">VISIT CHANNEL</a></div>`;
            }
        }

        function formatLiteralDate(isoString) {
            if (!isoString) return "";
            const [datePart, timePart] = isoString.split('T');
            const [year, monthNum, day] = datePart.split('-');
            let [hour, minute] = timePart.split(':');
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            let h = parseInt(hour); let ampm = h >= 12 ? 'PM' : 'AM';
            if (h > 12) h -= 12; if (h === 0) h = 12;
            return `${months[parseInt(monthNum)-1]} ${parseInt(day)} • ${h}:${minute} ${ampm}`;
        }

        async function loadStore() {
            const container = document.getElementById('store-container');
            try {
                const res = await fetch(`${API_URL}/items`);
                const items = await res.json();
                if(items.error) return;
                
                items.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
                let storeHTML = '';
                const now = new Date().getTime();
                let visibleCount = 0;
                
                items.forEach(item => {
                    if (item.hidden) return; 
                    visibleCount++;

                    let tagClass = 'tag-msrp', tagText = 'Standard Box';
                    if (item.type === 'baller') { tagClass = 'tag-baller'; tagText = 'Premium Box'; } 
                    else if (item.type === 'bundle') { tagClass = 'tag-bundle'; tagText = 'Bundle Box'; }
                    
                    let timeBadgeHTML = '', dateDisplayHTML = '', startTime = null, endTime = null, isLive = false, isEnded = false;

                    if (item.scheduleDate) {
                        dateDisplayHTML = `<div class="date-row"><i class="ph-fill ph-calendar-blank"></i> ${formatLiteralDate(item.scheduleDate)}</div>`;
                        startTime = new Date(item.scheduleDate + "-06:00").getTime(); // Adjust timezone if needed
                    }
                    if (item.scheduleEnd) endTime = new Date(item.scheduleEnd + "-06:00").getTime();

                    if(item.stock <= 0) isEnded = true; 
                    else if (startTime) {
                        if (endTime && now >= endTime) isEnded = true;
                        else if (now >= startTime) isLive = true;
                    }

                    if (!isEnded) {
                        if (isLive) timeBadgeHTML = `<div class="time-tag-bottom tag-is-live"><i class="ph-fill ph-broadcast"></i> LIVE NOW</div>`;
                        else if (startTime) timeBadgeHTML = `<div class="time-tag-bottom countdown-timer" data-date="${item.scheduleDate}" data-end="${item.scheduleEnd||''}" data-id="${item.id}"><i class="ph-fill ph-clock"></i> CALC...</div>`;
                    }

                    let btnHTML = '';
                    if (isEnded) btnHTML = `<div class="buy-btn sold-out">SOLD OUT</div>`;
                    else if (item.googleFormLink) {
                        let btnText = isLive ? "JOIN LIVE DRAW" : "RESERVE SPOT";
                        let btnClass = isLive ? "buy-btn live-btn" : "buy-btn";
                        btnHTML = `<a href="${item.googleFormLink}" target="_blank" id="btn-${item.id}" class="${btnClass}" onclick="trackClick('${item.id}')">
                                    <span>${btnText}</span></a>`;
                    } else btnHTML = `<div class="buy-btn sold-out">COMING SOON</div>`;
                    
                    const img = item.image || 'https://assets.pokemon.com/assets/cms2/img/misc/trading-card-games/cards/tcg_default_card.png';
                    
                    storeHTML += `
                        <div class="item-card glass-panel" id="card-${item.id}">
                            <div class="type-tag ${tagClass}">${tagText}</div>
                            <div class="item-img-box" onclick="openModal('${img}')">
                                <img src="${img}" class="item-img">
                                <div id="badge-container-${item.id}">${timeBadgeHTML}</div>
                            </div>
                            <div class="item-content">
                                <h3>${item.name}</h3>
                                ${dateDisplayHTML} 
                                <p>${item.description}</p>
                                <div class="price-row">
                                    <span class="price">$${item.price.toFixed(2)}</span>
                                    <span class="stock">${item.stock} Spots</span>
                                </div>
                                <div id="btn-container-${item.id}">${btnHTML}</div>
                            </div>
                        </div>`;
                });
                
                if (visibleCount === 0) {
                    storeHTML = `
                        <div class="empty-state">
                            <h2>The Vault is Empty</h2>
                            <p>There are no breaks available right now. I'm currently sourcing the best packs for our next stream. Make sure to subscribe to the channel so you don't miss the drop!</p>
                        </div>`;
                }
                container.innerHTML = storeHTML;
                startCountdownTimer();
            } catch(e) { console.error(e); }
        }

        function updateTimers() {
            const timers = document.querySelectorAll('.countdown-timer');
            const now = new Date().getTime();
            timers.forEach(timer => {
                const dateStr = timer.dataset.date, endDateStr = timer.dataset.end, itemId = timer.dataset.id;
                const startTarget = new Date(dateStr + "-06:00").getTime();
                let endTarget = endDateStr ? new Date(endDateStr + "-06:00").getTime() : null;

                if (endTarget && now >= endTarget) {
                    const btnContainer = document.getElementById(`btn-container-${itemId}`);
                    if(btnContainer) btnContainer.innerHTML = `<div class="buy-btn sold-out">SOLD OUT</div>`;
                    const badgeContainer = document.getElementById(`badge-container-${itemId}`);
                    if(badgeContainer) badgeContainer.innerHTML = '';
                    return;
                }

                const distance = startTarget - now;
                if (distance < 0) {
                    const badgeContainer = document.getElementById(`badge-container-${itemId}`);
                    if(badgeContainer && !badgeContainer.innerHTML.includes('LIVE NOW')) badgeContainer.innerHTML = `<div class="time-tag-bottom tag-is-live"><i class="ph-fill ph-broadcast"></i> LIVE NOW</div>`;
                    const btnContainer = document.getElementById(`btn-container-${itemId}`);
                    const anchor = btnContainer?.querySelector('a');
                    if(anchor && !anchor.classList.contains('live-btn')) {
                        anchor.className = "buy-btn live-btn";
                        anchor.querySelector('span').innerText = "JOIN LIVE DRAW";
                    }
                } else {
                    const d = Math.floor(distance / 86400000), h = Math.floor((distance % 86400000) / 3600000), m = Math.floor((distance % 3600000) / 60000);
                    timer.innerHTML = `<i class="ph-fill ph-clock"></i> ${d > 0 ? d + 'd ' : ''}${h}h ${m}m`;
                }
            });
        }

        function startCountdownTimer() { updateTimers(); setInterval(updateTimers, 60000); }
        function trackClick(id) { fetch(`${API_URL}/click`, { method: 'POST', body: JSON.stringify({ id: id }) }).catch(()=>{}); }
        
        loadVideos(); loadStore();

        function openModal(src) { document.getElementById("myModal").style.display = "flex"; document.getElementById("img01").src = src; }
        function closeModal() { document.getElementById("myModal").style.display = "none"; }
        document.addEventListener('keydown', e => { if (e.key === "Escape") closeModal(); });
    </script>
